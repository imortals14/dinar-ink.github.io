<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Ink Mixer Pro · GREIF · Адаптивная экспертиза</title>
  <meta name="theme-color" content="#0f172a">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #818cf8;
      --primary-dark: #4f46e5;
      --accent: #f59e0b;
      --success: #10b981;
      --greif-green: #22c55e;
      --dark-bg: #020617;
      --card-bg: rgba(15, 23, 42, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 10% 20%, #0a0f2a, var(--dark-bg));
      color: var(--text-main);
      min-height: 100vh;
      padding: 1.5rem 1rem;
    }

    .container {
      max-width: 550px;
      margin: 0 auto;
    }

    .logo-container {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .custom-logo {
      display: inline-block;
      text-align: center;
    }
    .logo-g {
      font-size: 4.5rem;
      font-weight: 900;
      letter-spacing: -4px;
      background: linear-gradient(135deg, #ffffff, #22c55e, #facc15);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 15px rgba(34, 197, 94, 0.5);
      display: inline-block;
      transform: scaleX(1.05);
      margin-right: -6px;
    }
    .logo-r {
      font-size: 4.5rem;
      font-weight: 900;
      letter-spacing: -4px;
      background: linear-gradient(135deg, #ffffff, #22c55e, #facc15);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 15px rgba(34, 197, 94, 0.5);
      display: inline-block;
      transform: rotate(-1deg);
      margin-right: -4px;
    }
    .logo-eif {
      font-size: 4.5rem;
      font-weight: 900;
      letter-spacing: -4px;
      background: linear-gradient(135deg, #ffffff, #22c55e, #facc15);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 15px rgba(34, 197, 94, 0.5);
    }
    .logo-tagline {
      font-size: 0.75rem;
      letter-spacing: 4px;
      color: #cbd5e1;
      font-weight: 600;
      margin-top: 8px;
      word-spacing: 3px;
    }

    .header {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .title {
      font-size: 1.9rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ffffff, var(--primary), var(--accent));
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .mode-switch {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border-radius: 60px;
      padding: 6px;
      display: flex;
      gap: 8px;
      margin-bottom: 1.8rem;
      border: 1px solid var(--card-border);
    }
    .mode-btn {
      flex: 1;
      padding: 10px 6px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      background: transparent;
      color: var(--text-muted);
      border: none;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .mode-btn.active {
      background: linear-gradient(110deg, var(--primary-dark), var(--primary));
      color: white;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 2rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.2rem;
    }

    .input-group {
      margin-bottom: 1.2rem;
    }
    label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      display: block;
      margin-bottom: 0.4rem;
      letter-spacing: 0.4px;
    }
    input, select {
      width: 100%;
      padding: 14px 18px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 1.3rem;
      font-size: 1rem;
      color: white;
      font-weight: 500;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
    }
    .helper-text {
      font-size: 0.7rem;
      color: #5b6e8c;
      margin-top: 5px;
    }
    .chip-info {
      background: rgba(34, 197, 94, 0.15);
      padding: 8px 12px;
      border-radius: 40px;
      text-align: center;
      margin: 1rem 0 0.3rem;
      border-left: 3px solid var(--greif-green);
    }

    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 2rem;
      font-weight: 700;
      font-size: 0.95rem;
      background: linear-gradient(105deg, var(--primary), var(--primary-dark));
      color: white;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 0.8rem;
    }
    .btn-secondary {
      background: linear-gradient(105deg, #334155, #1e293b);
    }
    .btn-small {
      padding: 8px 12px;
      font-size: 0.8rem;
      margin-top: 0;
      width: auto;
      display: inline-flex;
    }

    .result-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 10px 0;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
    }
    .solvent-value {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(120deg, #fff, #c7f0e2);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .feedback-block {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.2);
    }
    .temp-input {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 1rem;
    }
    .temp-input input {
      flex: 1;
      margin-bottom: 0;
    }
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 15px 0;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      font-weight: normal;
      text-transform: none;
      font-size: 0.9rem;
    }
    .ai-suggestion {
      background: linear-gradient(105deg, rgba(99,102,241,0.2), rgba(79,70,229,0.1));
      border-radius: 1.2rem;
      padding: 1rem;
      margin: 1rem 0;
      border: 1px solid var(--primary);
    }
    
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(8px);
      z-index: 1000;
      justify-content: center;
      align-items: center;
    }
    .modal-content {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 2rem;
      padding: 1.5rem;
      max-width: 500px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }
    .manufacturer-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .manufacturer-actions {
      display: flex;
      gap: 8px;
    }
    .icon-btn {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 8px;
      transition: 0.2s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.1); }
    footer {
      text-align: center;
      font-size: 0.65rem;
      color: #334155;
      margin-top: 1rem;
    }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>
<div class="container">
  <div class="logo-container">
    <div class="custom-logo">
      <span class="logo-g">G</span><span class="logo-r">R</span><span class="logo-eif">EIF</span>
      <div class="logo-tagline">PACKAGING SUCCESS TOGETHER</div>
    </div>
  </div>

  <div class="header">
    <h1 class="title">Ink Mixer Pro</h1>
    <p class="subtitle">Адаптивная система · Жара / Холод</p>
  </div>

  <div class="mode-switch" id="modeSwitch">
    <button class="mode-btn active" data-mode="fresh">🆕 Чистые чернила</button>
    <button class="mode-btn" data-mode="diluted">⚖️ Долив в разбавленные</button>
  </div>

  <div class="card">
    <div class="flex-between">
      <div class="card-title"><span>📐</span> <span id="formTitle">Параметры замеса</span></div>
      <button class="btn-small btn-secondary" id="openManufacturerBtn">🏭 Управление</button>
    </div>
    <div class="input-group">
      <label for="manufacturer">🏭 Производитель</label>
      <select id="manufacturer"></select>
    </div>
    <div id="dynamicFields"></div>
    <button class="btn" id="calculateBtn">🧮 РАССЧИТАТЬ БАЗОВЫЙ РЕЦЕПТ</button>
  </div>

  <div class="card" id="resultCard" style="display: none;">
    <div class="card-title"><span>📊</span> Базовый рецепт</div>
    <div id="resultContent"></div>
    
    <div class="feedback-block" id="feedbackBlock">
      <div class="card-title" style="margin-top: 0;">🧠 Обратная связь (обучение системы)</div>
      <div class="temp-input">
        <input type="number" id="workshopTemp" placeholder="Температура в цеху, °C" step="1">
        <span>°C</span>
      </div>
      <div class="radio-group">
        <label><input type="radio" name="issue" value="good"> ✅ Всё отлично, пропорция подошла</label>
        <label><input type="radio" name="issue" value="dry"> 🔥 Слишком быстро сохнет / рамка пересыхает (жарко)</label>
        <label><input type="radio" name="issue" value="slow"> ❄️ Слишком медленно сохнет, долго ждать (холодно)</label>
      </div>
      <div id="adviceBlock" style="display: none;">
        <div class="ai-suggestion" id="aiSuggestionText">💡 На основе прошлых замесов: ...</div>
        <div class="input-group">
          <label id="additiveLabel">🔧 Сколько добавить (мл)?</label>
          <input type="number" id="additiveAmount" placeholder="например 100" value="100">
        </div>
        <button class="btn btn-secondary" id="saveFeedbackBtn">💾 Сохранить решение и обучить систему</button>
      </div>
    </div>
  </div>
  <footer>© GREIF Ink Mixer Pro — система учитывает жару и холод</footer>
</div>

<div id="manufacturerModal" class="modal">
  <div class="modal-content">
    <div class="flex-between">
      <div class="card-title" style="margin-bottom: 0;">🏭 Производители чернил</div>
      <button id="closeModalBtn" style="background:none; border:none; color:white; font-size:1.5rem; cursor:pointer;">&times;</button>
    </div>
    <div id="manufacturerList"></div>
    <button id="addManufacturerBtn" class="btn btn-secondary" style="margin-top: 1rem;">➕ Добавить производителя</button>
  </div>
</div>

<script>
  // ----- БАЗОВЫЙ НАБОР ПРОИЗВОДИТЕЛЕЙ -----
  const defaultManufacturers = {
    sankem: { name: "Санкемикалз", solventPercent: 0.267, cf2000ratio: 0.75, cf3000ratio: 0.25, isDefault: true },
    siko: { name: "Сико", solventPercent: 0.333, cf2000ratio: 0.4, cf3000ratio: 0.6, isDefault: true },
    china: { name: "Китай", solventPercent: 0.25, cf2000ratio: 0.8, cf3000ratio: 0.2, isDefault: true },
    tampo: { name: "Тампо Механика", solventPercent: 0.221, cf2000ratio: 0.333, cf3000ratio: 0.667, isDefault: true }
  };

  let customManufacturers = {};
  function loadManufacturers() {
    const saved = localStorage.getItem('inkMixerManufacturers');
    if (saved) { try { customManufacturers = JSON.parse(saved); } catch(e) {} }
    updateSelectAndList();
  }
  function saveManufacturers() {
    localStorage.setItem('inkMixerManufacturers', JSON.stringify(customManufacturers));
    updateSelectAndList();
  }
  function getAllManufacturers() { return { ...defaultManufacturers, ...customManufacturers }; }
  function updateSelectAndList() {
    const select = document.getElementById('manufacturer');
    const all = getAllManufacturers();
    select.innerHTML = '';
    for (const [key, man] of Object.entries(all)) {
      select.appendChild(new Option(`${man.name} (${Math.round(man.solventPercent*100)}% раст. | ${Math.round(man.cf2000ratio*100)}/${Math.round(man.cf3000ratio*100)})`, key));
    }
    renderManufacturerList();
  }
  function renderManufacturerList() {
    const container = document.getElementById('manufacturerList');
    const all = getAllManufacturers();
    container.innerHTML = '';
    for (const [key, man] of Object.entries(all)) {
      const div = document.createElement('div'); div.className = 'manufacturer-item';
      div.innerHTML = `<div><strong>${man.name}</strong><br><small>${Math.round(man.solventPercent*100)}% растворителя, CF2000: ${Math.round(man.cf2000ratio*100)}% / CF3000: ${Math.round(man.cf3000ratio*100)}%</small></div>
        <div class="manufacturer-actions">${!man.isDefault ? `<button class="icon-btn edit-man" data-key="${key}">✏️</button><button class="icon-btn delete-man" data-key="${key}">🗑️</button>` : '<span style="color:#5b6e8c;">заводской</span>'}</div>`;
      container.appendChild(div);
    }
    document.querySelectorAll('.edit-man').forEach(btn => btn.addEventListener('click', () => editManufacturer(btn.dataset.key)));
    document.querySelectorAll('.delete-man').forEach(btn => btn.addEventListener('click', () => deleteManufacturer(btn.dataset.key)));
  }
  function editManufacturer(key) {
    const all = getAllManufacturers(); const man = all[key];
    if (!man) return;
    if (man.isDefault) { alert("Заводского производителя нельзя изменить. Создайте копию через 'Добавить'."); return; }
    const newName = prompt("Название", man.name); if (!newName) return;
    let pct = parseFloat(prompt("Процент растворителя", man.solventPercent*100)); if (isNaN(pct)) return;
    let cf2 = parseFloat(prompt("Доля CF2000 (%)", man.cf2000ratio*100)); if (isNaN(cf2)) return;
    let cf3 = parseFloat(prompt("Доля CF3000 (%)", man.cf3000ratio*100)); if (isNaN(cf3) || Math.abs(cf2+cf3-100)>0.1) { alert("Сумма должна быть 100%"); return; }
    customManufacturers[key] = { name: newName, solventPercent: pct/100, cf2000ratio: cf2/100, cf3000ratio: cf3/100, isDefault: false };
    saveManufacturers();
  }
  function deleteManufacturer(key) { if (defaultManufacturers[key]) { alert("Нельзя удалить заводского"); return; } delete customManufacturers[key]; saveManufacturers(); }
  function addManufacturer() {
    const name = prompt("Название производителя"); if (!name) return;
    let pct = parseFloat(prompt("Процент растворителя (%)", "26.7")); if (isNaN(pct)) return;
    let cf2 = parseFloat(prompt("Доля CF2000 (%)", "75")); if (isNaN(cf2)) return;
    let cf3 = parseFloat(prompt("Доля CF3000 (%)", "25")); if (isNaN(cf3) || Math.abs(cf2+cf3-100)>0.1) { alert("Сумма должна быть 100%"); return; }
    const key = "custom_" + Date.now() + "_" + Math.floor(Math.random()*1000);
    customManufacturers[key] = { name, solventPercent: pct/100, cf2000ratio: cf2/100, cf3000ratio: cf3/100, isDefault: false };
    saveManufacturers();
  }

  function getManufacturerData() {
    const key = document.getElementById('manufacturer').value;
    return getAllManufacturers()[key];
  }

  // ---------- ОБУЧАЮЩАЯ СИСТЕМА (ЖАРА / ХОЛОД) ----------
  let currentMode = 'fresh';
  let lastCalculationResult = null;

  function loadTrainingData() {
    const saved = localStorage.getItem('inkMixerTraining2');
    return saved ? JSON.parse(saved) : [];
  }
  function saveTrainingData(data) {
    localStorage.setItem('inkMixerTraining2', JSON.stringify(data));
  }
  // issue: "dry" (сохнет быстро) → добавляем CF5000, "slow" (сохнет медленно) → добавляем CF2000
  function addExperience(inkWeight, temperature, issue, addedMl, manufacturerKey) {
    if (!temperature || !issue || issue === 'good') return;
    let training = loadTrainingData();
    training.push({ date: new Date().toISOString(), inkWeight, temperature, issue, addedMl, manufacturer: manufacturerKey });
    if (training.length > 50) training = training.slice(-50);
    saveTrainingData(training);
  }
  function getRecommendation(inkWeight, temperature, manufacturerKey) {
    const training = loadTrainingData();
    if (training.length === 0) return null;
    // Ищем похожие случаи (температура ±5°C, вес ±20%)
    const similar = training.filter(exp => {
      const weightMatch = Math.abs(exp.inkWeight - inkWeight) / inkWeight < 0.2;
      const tempMatch = Math.abs(exp.temperature - temperature) <= 5;
      const manMatch = exp.manufacturer === manufacturerKey;
      return weightMatch && tempMatch && manMatch;
    });
    if (similar.length === 0) return null;
    // Если температура выше 30°C и есть случаи "dry" — предлагаем CF5000
    if (temperature >= 30) {
      const dryCases = similar.filter(e => e.issue === 'dry');
      if (dryCases.length > 0) {
        const avg = dryCases.reduce((s,e) => s + e.addedMl, 0) / dryCases.length;
        return { solvent: "CF5000", ml: Math.round(avg), count: dryCases.length, issue: "dry" };
      }
    }
    // Если температура ниже 20°C и есть случаи "slow" — предлагаем CF2000
    if (temperature <= 20) {
      const slowCases = similar.filter(e => e.issue === 'slow');
      if (slowCases.length > 0) {
        const avg = slowCases.reduce((s,e) => s + e.addedMl, 0) / slowCases.length;
        return { solvent: "CF2000", ml: Math.round(avg), count: slowCases.length, issue: "slow" };
      }
    }
    return null;
  }

  function calculateFresh(inkWeight, data) {
    const totalSolventML = inkWeight * data.solventPercent;
    const cf2000 = Math.round(totalSolventML * data.cf2000ratio);
    const cf3000 = Math.round(totalSolventML * data.cf3000ratio);
    return { cf2000, cf3000, totalSolvent: Math.round(totalSolventML), addedInkGrams: inkWeight };
  }
  function calculateDiluted(initialWeight, finalWeight, data) {
    const addedInk = finalWeight - initialWeight;
    if (addedInk <= 0) return null;
    const totalSolventML = addedInk * data.solventPercent;
    const cf2000 = Math.round(totalSolventML * data.cf2000ratio);
    const cf3000 = Math.round(totalSolventML * data.cf3000ratio);
    return { cf2000, cf3000, totalSolvent: Math.round(totalSolventML), addedInkGrams: addedInk };
  }

  function renderDynamicFields() {
    const container = document.getElementById('dynamicFields');
    const titleSpan = document.getElementById('formTitle');
    if (currentMode === 'fresh') {
      titleSpan.innerText = 'Разбавление чистых чернил';
      container.innerHTML = `<div class="input-group"><label>🎨 Вес ЧИСТЫХ чернил (граммы)</label><input type="number" id="freshWeight" placeholder="например: 1000" step="1" autofocus></div>`;
    } else {
      titleSpan.innerText = 'Долив в разбавленные (весовой метод)';
      container.innerHTML = `
        <div class="input-group"><label>📦 Вес банки с разбавленными (г)</label><input type="number" id="initialWeight" placeholder="например: 500"></div>
        <div class="input-group"><label>➕ Вес после добавления чистых (г)</label><input type="number" id="finalWeight" placeholder="например: 1300"></div>
        <div id="autoAddedPreview" class="chip-info" style="display:none;">⚡ Добавлено чистых: <strong id="previewAdded">0</strong> г</div>
      `;
      const initInp = document.getElementById('initialWeight');
      const finalInp = document.getElementById('finalWeight');
      if (initInp && finalInp) {
        const update = () => {
          let init = parseFloat(initInp.value), fin = parseFloat(finalInp.value);
          let previewDiv = document.getElementById('autoAddedPreview');
          let span = document.getElementById('previewAdded');
          if (!isNaN(init) && !isNaN(fin) && fin > init && init >= 0) {
            span.innerText = (fin - init).toFixed(1);
            previewDiv.style.display = 'block';
          } else previewDiv.style.display = 'none';
        };
        initInp.addEventListener('input', update);
        finalInp.addEventListener('input', update);
      }
    }
    document.getElementById('resultCard').style.display = 'none';
  }

  function performCalculation() {
    const manData = getManufacturerData();
    if (!manData) { alert("Выберите производителя"); return; }
    let res = null;
    let inkWeight = 0;
    if (currentMode === 'fresh') {
      let w = parseFloat(document.getElementById('freshWeight')?.value);
      if (isNaN(w) || w <= 0) { alert("Введите вес чистых чернил"); return; }
      res = calculateFresh(w, manData);
      inkWeight = w;
    } else {
      let init = parseFloat(document.getElementById('initialWeight')?.value);
      let fin = parseFloat(document.getElementById('finalWeight')?.value);
      if (isNaN(init) || isNaN(fin) || fin <= init) { alert("Введите корректные веса"); return; }
      res = calculateDiluted(init, fin, manData);
      if (!res) { alert("Ошибка"); return; }
      inkWeight = res.addedInkGrams;
    }
    if (!res) return;
    const manKey = document.getElementById('manufacturer').value;
    lastCalculationResult = { inkWeight, manufacturerKey: manKey, result: res };
    document.getElementById('resultContent').innerHTML = `
      <div class="helper-text" style="margin-bottom:8px;">📌 Чистые чернила: <strong>${res.addedInkGrams} г</strong></div>
      <div class="result-item"><span>🔵 CF2000 (ускоритель)</span><span class="solvent-value">${res.cf2000} мл</span></div>
      <div class="result-item"><span>🔴 CF3000</span><span class="solvent-value">${res.cf3000} мл</span></div>
      <div class="result-item"><span>⚡ Всего растворителя</span><span class="solvent-value">${res.totalSolvent} мл</span></div>
    `;
    document.getElementById('resultCard').style.display = 'block';
    document.getElementById('adviceBlock').style.display = 'none';
    document.getElementById('workshopTemp').value = '';
    document.querySelectorAll('input[name="issue"]').forEach(r => r.checked = false);
    document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
  }

  function onIssueChange() {
    const selected = document.querySelector('input[name="issue"]:checked');
    if (!selected || selected.value === 'good') {
      document.getElementById('adviceBlock').style.display = 'none';
      return;
    }
    const temp = parseFloat(document.getElementById('workshopTemp').value);
    if (!lastCalculationResult || isNaN(temp)) {
      document.getElementById('aiSuggestionText').innerHTML = `🌡️ Укажите температуру, чтобы получить рекомендацию.`;
      document.getElementById('adviceBlock').style.display = 'block';
      return;
    }
    const rec = getRecommendation(lastCalculationResult.inkWeight, temp, lastCalculationResult.manufacturerKey);
    const issue = selected.value;
    let solventName = (issue === 'dry') ? "CF5000 (замедлитель, от пересыхания)" : "CF2000 (ускоритель, от медленного высыхания)";
    if (rec) {
      document.getElementById('aiSuggestionText').innerHTML = `🧠 Анализ: при ~${temp}°C вы добавляли <strong>${rec.ml} мл ${rec.solvent}</strong> (${rec.count} случаев). Рекомендую.`;
      document.getElementById('additiveAmount').value = rec.ml;
    } else {
      document.getElementById('aiSuggestionText').innerHTML = `📝 Нет похожих случаев. Внесите решение сейчас — система запомнит для будущих замесов.`;
      document.getElementById('additiveAmount').value = 100;
    }
    document.getElementById('additiveLabel').innerHTML = `🔧 Сколько ${solventName} добавить (мл)?`;
    document.getElementById('adviceBlock').style.display = 'block';
  }

  function saveCurrentExperience() {
    if (!lastCalculationResult) return;
    const temp = parseFloat(document.getElementById('workshopTemp').value);
    const addedMl = parseFloat(document.getElementById('additiveAmount').value);
    const selectedIssue = document.querySelector('input[name="issue"]:checked');
    if (!selectedIssue || selectedIssue.value === 'good') { alert("Выберите проблему"); return; }
    if (isNaN(temp) || temp < -20) { alert("Укажите температуру"); return; }
    if (isNaN(addedMl) || addedMl <= 0) { alert("Укажите количество"); return; }
    addExperience(lastCalculationResult.inkWeight, temp, selectedIssue.value, addedMl, lastCalculationResult.manufacturerKey);
    const solventName = (selectedIssue.value === 'dry') ? "CF5000" : "CF2000";
    alert(`✅ Опыт сохранён! При ${temp}°C, вес ${lastCalculationResult.inkWeight}г → +${addedMl} мл ${solventName}`);
    document.getElementById('adviceBlock').style.display = 'none';
    document.querySelectorAll('input[name="issue"]').forEach(r => r.checked = false);
  }

  function bindEvents() {
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentMode = btn.dataset.mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderDynamicFields();
        document.getElementById('resultCard').style.display = 'none';
      });
    });
    document.getElementById('calculateBtn').addEventListener('click', performCalculation);
    document.getElementById('manufacturer').addEventListener('change', () => document.getElementById('resultCard').style.display = 'none');
    document.querySelectorAll('input[name="issue"]').forEach(r => r.addEventListener('change', onIssueChange));
    document.getElementById('saveFeedbackBtn')?.addEventListener('click', saveCurrentExperience);
    document.getElementById('workshopTemp')?.addEventListener('input', () => {
      if (document.querySelector('input[name="issue"]:checked') && document.querySelector('input[name="issue"]:checked').value !== 'good') onIssueChange();
    });
    document.getElementById('openManufacturerBtn').addEventListener('click', () => { document.getElementById('manufacturerModal').style.display = 'flex'; });
    document.getElementById('closeModalBtn').addEventListener('click', () => { document.getElementById('manufacturerModal').style.display = 'none'; });
    document.getElementById('addManufacturerBtn').addEventListener('click', () => { addManufacturer(); document.getElementById('manufacturerModal').style.display = 'none'; setTimeout(() => { document.getElementById('manufacturerModal').style.display = 'flex'; }, 100); });
    window.addEventListener('click', (e) => { if (e.target === document.getElementById('manufacturerModal')) document.getElementById('manufacturerModal').style.display = 'none'; });
  }

  loadManufacturers();
  renderDynamicFields();
  bindEvents();
</script>
</body>
</html>
