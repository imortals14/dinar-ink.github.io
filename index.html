<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Ink Mixer Pro · GREIF · Экспертная система</title>
  <meta name="theme-color" content="#0f172a">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #818cf8;
      --primary-dark: #4f46e5;
      --accent: #f59e0b;
      --success: #10b981;
      --greif-green: #22c55e;
      --dark-bg: #020617;
      --card-bg: rgba(15, 23, 42, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 10% 20%, #0a0f2a, var(--dark-bg));
      color: var(--text-main);
      min-height: 100vh;
      padding: 1.5rem 1rem;
    }

    .container {
      max-width: 550px;
      margin: 0 auto;
    }

    .logo-container {
      text-align: center;
      margin-bottom: 1.2rem;
    }
    .company-logo {
      max-width: 85%;
      height: auto;
      max-height: 100px;
      filter: drop-shadow(0 4px 12px rgba(34, 197, 94, 0.2));
    }

    .header {
      text-align: center;
      margin-bottom: 1.8rem;
    }
    .title {
      font-size: 1.9rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ffffff, var(--primary), var(--accent));
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .mode-switch {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border-radius: 60px;
      padding: 6px;
      display: flex;
      gap: 8px;
      margin-bottom: 1.8rem;
      border: 1px solid var(--card-border);
    }
    .mode-btn {
      flex: 1;
      padding: 10px 6px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      background: transparent;
      color: var(--text-muted);
      border: none;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .mode-btn.active {
      background: linear-gradient(110deg, var(--primary-dark), var(--primary));
      color: white;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
    }

    .card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 2rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.2rem;
    }

    .input-group {
      margin-bottom: 1.2rem;
    }
    label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      display: block;
      margin-bottom: 0.4rem;
      letter-spacing: 0.4px;
    }
    input, select {
      width: 100%;
      padding: 14px 18px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 1.3rem;
      font-size: 1rem;
      color: white;
      font-weight: 500;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
    }
    .helper-text {
      font-size: 0.7rem;
      color: #5b6e8c;
      margin-top: 5px;
    }
    .chip-info {
      background: rgba(34, 197, 94, 0.15);
      padding: 8px 12px;
      border-radius: 40px;
      text-align: center;
      margin: 1rem 0 0.3rem;
      border-left: 3px solid var(--greif-green);
    }

    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 2rem;
      font-weight: 700;
      font-size: 0.95rem;
      background: linear-gradient(105deg, var(--primary), var(--primary-dark));
      color: white;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 0.8rem;
    }
    .btn-secondary {
      background: linear-gradient(105deg, #334155, #1e293b);
    }
    .btn-warning {
      background: linear-gradient(105deg, #f59e0b, #d97706);
    }

    .result-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 10px 0;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
    }
    .solvent-value {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(120deg, #fff, #c7f0e2);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .feedback-block {
      margin-top: 1.5rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.2);
    }
    .temp-input {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 1rem;
    }
    .temp-input input {
      flex: 1;
      margin-bottom: 0;
    }
    .radio-group {
      display: flex;
      gap: 20px;
      margin: 10px 0;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-weight: normal;
      text-transform: none;
    }

    .ai-suggestion {
      background: linear-gradient(105deg, rgba(99,102,241,0.2), rgba(79,70,229,0.1));
      border-radius: 1.2rem;
      padding: 1rem;
      margin: 1rem 0;
      border: 1px solid var(--primary);
    }
    footer {
      text-align: center;
      font-size: 0.65rem;
      color: #334155;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="logo-container">
    <img src="greif-logo.png" alt="GREIF Logo" class="company-logo" style="mix-blend-mode: multiply; max-width: 90%; max-height: 110px;">
  </div>
  <div class="header">
    <h1 class="title">Ink Mixer Pro</h1>
    <p class="subtitle">Экспертная система с обучением</p>
  </div>

  <div class="mode-switch" id="modeSwitch">
    <button class="mode-btn active" data-mode="fresh">🆕 Чистые чернила</button>
    <button class="mode-btn" data-mode="diluted">⚖️ Долив в разбавленные</button>
  </div>

  <div class="card">
    <div class="card-title"><span>📐</span> <span id="formTitle">Параметры замеса</span></div>
    <div class="input-group">
      <label for="manufacturer">🏭 Производитель</label>
      <select id="manufacturer">
        <option value="sankem">Санкемикалз (26.7% | 75/25)</option>
        <option value="siko">Сико (33.3% | 40/60)</option>
        <option value="china">Китай (25% | 80/20)</option>
        <option value="tampo">Тампо Механика (22.1% | 33/67)</option>
      </select>
    </div>
    <div id="dynamicFields"></div>
    <button class="btn" id="calculateBtn">🧮 РАССЧИТАТЬ БАЗОВЫЙ РЕЦЕПТ</button>
  </div>

  <div class="card" id="resultCard" style="display: none;">
    <div class="card-title"><span>📊</span> Базовый рецепт</div>
    <div id="resultContent"></div>
    
    <div class="feedback-block" id="feedbackBlock">
      <div class="card-title" style="margin-top: 0;">🧠 Обратная связь (обучение системы)</div>
      <div class="temp-input">
        <input type="number" id="workshopTemp" placeholder="Температура в цеху, °C" step="1">
        <span>°C</span>
      </div>
      <div class="radio-group">
        <label><input type="radio" name="dryness" value="good"> ✅ Всё успевает</label>
        <label><input type="radio" name="dryness" value="bad"> ⚠️ Нет, рамка сохнет / нужен CF5000</label>
      </div>
      <div id="cf5000AdviceBlock" style="display: none;">
        <div class="ai-suggestion" id="aiSuggestionText">
          💡 На основе прошлых замесов: ...
        </div>
        <div class="input-group">
          <label>🔧 Сколько CF5000 добавить (мл)?</label>
          <input type="number" id="cf5000Amount" placeholder="например 100" value="100">
        </div>
        <button class="btn btn-secondary" id="saveFeedbackBtn">💾 Сохранить решение и обучить систему</button>
      </div>
    </div>
  </div>
  <footer>© GREIF Ink Mixer Pro — система накапливает ваш опыт</footer>
</div>

<script>
  // ------ БАЗА ПРОИЗВОДИТЕЛЕЙ ------
  const manufacturerData = {
    sankem: { name:"Санкемикалз", solventPercent:0.267, cf2000ratio:0.75, cf3000ratio:0.25, costCf2000PerLiter:150, costCf3000PerLiter:200 },
    siko: { name:"Сико", solventPercent:0.333, cf2000ratio:0.4, cf3000ratio:0.6, costCf2000PerLiter:150, costCf3000PerLiter:200 },
    china: { name:"Китай", solventPercent:0.25, cf2000ratio:0.8, cf3000ratio:0.2, costCf2000PerLiter:150, costCf3000PerLiter:200 },
    tampo: { name:"Тампо Механика", solventPercent:0.221, cf2000ratio:0.333, cf3000ratio:0.667, costCf2000PerLiter:150, costCf3000PerLiter:200 }
  };

  let currentMode = 'fresh';
  let lastCalculationResult = null; // храним последний результат, чтобы сохранить в обучение

  // ----- ЗАГРУЗКА И СОХРАНЕНИЕ ДАННЫХ ОБУЧЕНИЯ (localStorage) -----
  function loadTrainingData() {
    const saved = localStorage.getItem('inkMixerTraining');
    if (saved) {
      try {
        return JSON.parse(saved);
      } catch(e) { return []; }
    }
    return [];
  }

  function saveTrainingData(data) {
    localStorage.setItem('inkMixerTraining', JSON.stringify(data));
  }

  // Добавление нового опыта (вес чернил, температура, добавил ли CF5000, сколько)
  function addExperience(inkWeight, temperature, addedCF5000, manufacturerKey) {
    if (!temperature || temperature < 20) return;
    let training = loadTrainingData();
    training.push({
      date: new Date().toISOString(),
      inkWeight: inkWeight,
      temperature: temperature,
      addedCF5000: addedCF5000,
      manufacturer: manufacturerKey
    });
    // Оставляем последние 50 записей, чтобы не раздувать
    if (training.length > 50) training = training.slice(-50);
    saveTrainingData(training);
    console.log("Обучение сохранено:", {inkWeight, temperature, addedCF5000});
  }

  // Поиск похожих ситуаций для рекомендации
  function getRecommendation(inkWeight, temperature, manufacturerKey) {
    const training = loadTrainingData();
    if (training.length === 0) return null;
    // Ищем записи с похожим весом (+- 20%) и температурой (+- 5 градусов) и тем же производителем
    const similar = training.filter(exp => {
      const weightMatch = Math.abs(exp.inkWeight - inkWeight) / inkWeight < 0.2;
      const tempMatch = Math.abs(exp.temperature - temperature) <= 5;
      const manMatch = exp.manufacturer === manufacturerKey;
      return weightMatch && tempMatch && manMatch && exp.addedCF5000 > 0;
    });
    if (similar.length === 0) return null;
    // Усредняем количество CF5000 из похожих ситуаций
    const avgCF5000 = similar.reduce((sum, e) => sum + e.addedCF5000, 0) / similar.length;
    return { ml: Math.round(avgCF5000), count: similar.length };
  }

  // ----- ЛОГИКА РАСЧЁТОВ -----
  function getManufacturerData() {
    return manufacturerData[document.getElementById('manufacturer').value];
  }

  function calculateFresh(inkWeight, data) {
    const totalSolventML = inkWeight * data.solventPercent;
    const cf2000 = Math.round(totalSolventML * data.cf2000ratio);
    const cf3000 = Math.round(totalSolventML * data.cf3000ratio);
    return { cf2000, cf3000, totalSolvent: Math.round(totalSolventML), addedInkGrams: inkWeight };
  }

  function calculateDiluted(initialWeight, finalWeight, data) {
    const addedInk = finalWeight - initialWeight;
    if (addedInk <= 0) return null;
    const totalSolventML = addedInk * data.solventPercent;
    const cf2000 = Math.round(totalSolventML * data.cf2000ratio);
    const cf3000 = Math.round(totalSolventML * data.cf3000ratio);
    return { cf2000, cf3000, totalSolvent: Math.round(totalSolventML), addedInkGrams: addedInk };
  }

  function renderDynamicFields() {
    const container = document.getElementById('dynamicFields');
    const titleSpan = document.getElementById('formTitle');
    if (currentMode === 'fresh') {
      titleSpan.innerText = 'Разбавление чистых чернил';
      container.innerHTML = `<div class="input-group"><label>🎨 Вес ЧИСТЫХ чернил (граммы)</label><input type="number" id="freshWeight" placeholder="например: 1000" step="1" autofocus></div>`;
    } else {
      titleSpan.innerText = 'Долив в разбавленные (весовой метод)';
      container.innerHTML = `
        <div class="input-group"><label>📦 Вес банки с разбавленными (г)</label><input type="number" id="initialWeight" placeholder="например: 500"></div>
        <div class="input-group"><label>➕ Вес после добавления чистых (г)</label><input type="number" id="finalWeight" placeholder="например: 1300"></div>
        <div id="autoAddedPreview" class="chip-info" style="display:none;">⚡ Добавлено чистых: <strong id="previewAdded">0</strong> г</div>
      `;
      const initInp = document.getElementById('initialWeight');
      const finalInp = document.getElementById('finalWeight');
      if (initInp && finalInp) {
        const update = () => {
          let init = parseFloat(initInp.value), fin = parseFloat(finalInp.value);
          let previewDiv = document.getElementById('autoAddedPreview');
          let span = document.getElementById('previewAdded');
          if (!isNaN(init) && !isNaN(fin) && fin > init && init >= 0) {
            span.innerText = (fin - init).toFixed(1);
            previewDiv.style.display = 'block';
          } else previewDiv.style.display = 'none';
        };
        initInp.addEventListener('input', update);
        finalInp.addEventListener('input', update);
      }
    }
    document.getElementById('resultCard').style.display = 'none';
  }

  function performCalculation() {
    const manData = getManufacturerData();
    let res = null;
    let inkWeight = 0;
    if (currentMode === 'fresh') {
      let w = parseFloat(document.getElementById('freshWeight')?.value);
      if (isNaN(w) || w <= 0) { alert("Введите вес чистых чернил"); return; }
      res = calculateFresh(w, manData);
      inkWeight = w;
    } else {
      let init = parseFloat(document.getElementById('initialWeight')?.value);
      let fin = parseFloat(document.getElementById('finalWeight')?.value);
      if (isNaN(init) || isNaN(fin) || fin <= init) { alert("Введите корректные веса"); return; }
      res = calculateDiluted(init, fin, manData);
      if (!res) { alert("Ошибка: финальный вес должен быть больше начального"); return; }
      inkWeight = res.addedInkGrams;
    }
    if (!res) return;
    lastCalculationResult = { inkWeight, manufacturerKey: document.getElementById('manufacturer').value, result: res };
    
    // Отображаем результат
    document.getElementById('resultContent').innerHTML = `
      <div class="helper-text" style="margin-bottom:8px;">📌 Чистые чернила: <strong>${res.addedInkGrams} г</strong></div>
      <div class="result-item"><span>🔵 CF2000</span><span class="solvent-value">${res.cf2000} мл</span></div>
      <div class="result-item"><span>🔴 CF3000</span><span class="solvent-value">${res.cf3000} мл</span></div>
      <div class="result-item"><span>⚡ Всего растворителя</span><span class="solvent-value">${res.totalSolvent} мл</span></div>
    `;
    document.getElementById('resultCard').style.display = 'block';
    document.getElementById('feedbackBlock').style.display = 'block';
    document.getElementById('cf5000AdviceBlock').style.display = 'none';
    document.getElementById('aiSuggestionText').innerHTML = '';
    document.getElementById('workshopTemp').value = '';
    document.querySelectorAll('input[name="dryness"]').forEach(r => r.checked = false);
    document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
  }

  // Обработчик выбора "чернила сохнут" — показать рекомендацию и блок CF5000
  function onDrynessChange() {
    const selected = document.querySelector('input[name="dryness"]:checked');
    if (!selected || selected.value !== 'bad') {
      document.getElementById('cf5000AdviceBlock').style.display = 'none';
      return;
    }
    // Пользователь сказал, что чернила сохнут — показываем блок с CF5000
    const tempInput = document.getElementById('workshopTemp');
    const temp = parseFloat(tempInput.value);
    if (!lastCalculationResult || isNaN(temp)) {
      // Если температура ещё не введена, показываем заглушку
      document.getElementById('aiSuggestionText').innerHTML = `🌡️ Укажите температуру, чтобы получить рекомендацию.`;
      document.getElementById('cf5000AdviceBlock').style.display = 'block';
      return;
    }
    const rec = getRecommendation(lastCalculationResult.inkWeight, temp, lastCalculationResult.manufacturerKey);
    const adviceBlock = document.getElementById('aiSuggestionText');
    if (rec) {
      adviceBlock.innerHTML = `🧠 Анализ прошлых замесов: при температуре ~${temp}°C и похожем весе вы добавляли <strong>${rec.ml} мл CF5000</strong> (на основе ${rec.count} случаев). Рекомендую повторить.`;
      document.getElementById('cf5000Amount').value = rec.ml;
    } else {
      adviceBlock.innerHTML = `📝 Пока нет похожих случаев при такой температуре. Внесите решение сейчас — система запомнит его для будущих замесов.`;
      document.getElementById('cf5000Amount').value = 100;
    }
    document.getElementById('cf5000AdviceBlock').style.display = 'block';
  }

  function saveCurrentExperience() {
    if (!lastCalculationResult) return;
    const temp = parseFloat(document.getElementById('workshopTemp').value);
    const cf5000ml = parseFloat(document.getElementById('cf5000Amount').value);
    if (isNaN(temp) || temp < 20) {
      alert("Пожалуйста, укажите температуру в цеху");
      return;
    }
    if (isNaN(cf5000ml) || cf5000ml <= 0) {
      alert("Укажите количество CF5000, которое вы добавили");
      return;
    }
    addExperience(lastCalculationResult.inkWeight, temp, cf5000ml, lastCalculationResult.manufacturerKey);
    alert(`✅ Опыт сохранён! При температуре ${temp}°C и весе ${lastCalculationResult.inkWeight}г добавлено ${cf5000ml} мл CF5000. Система запомнила.`);
    document.getElementById('cf5000AdviceBlock').style.display = 'none';
    document.querySelectorAll('input[name="dryness"]').forEach(r => r.checked = false);
  }

  // --- Привязка событий ---
  function bindEvents() {
    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentMode = btn.dataset.mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderDynamicFields();
        document.getElementById('resultCard').style.display = 'none';
      });
    });
    document.getElementById('calculateBtn').addEventListener('click', performCalculation);
    document.getElementById('manufacturer').addEventListener('change', () => document.getElementById('resultCard').style.display = 'none');
    document.querySelectorAll('input[name="dryness"]').forEach(radio => {
      radio.addEventListener('change', onDrynessChange);
    });
    document.getElementById('saveFeedbackBtn')?.addEventListener('click', saveCurrentExperience);
    const tempInput = document.getElementById('workshopTemp');
    if (tempInput) {
      tempInput.addEventListener('input', () => {
        if (document.querySelector('input[name="dryness"]:checked')?.value === 'bad') onDrynessChange();
      });
    }
  }

  renderDynamicFields();
  bindEvents();
</script>
</body>
</html>
