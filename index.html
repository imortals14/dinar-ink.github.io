<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Ink Mixer Pro · GREIF</title>
  <meta name="theme-color" content="#0f172a">
  <meta name="description" content="Профессиональный калькулятор пропорций чернил и растворителей для печатного производства.">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #818cf8;
      --primary-dark: #4f46e5;
      --accent: #f59e0b;
      --success: #10b981;
      --greif-green: #22c55e;
      --dark-bg: #020617;
      --card-bg: rgba(15, 23, 42, 0.7);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f1f5f9;
      --text-muted: #94a3b8;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 10% 20%, #0a0f2a, var(--dark-bg));
      color: var(--text-main);
      min-height: 100vh;
      padding: 1.5rem 1rem;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
    }

    /* ЛОГОТИП */
    .logo-container {
      text-align: center;
      margin-bottom: 1rem;
    }
    .company-logo {
      max-width: 85%;
      height: auto;
      max-height: 100px;
      filter: drop-shadow(0 4px 12px rgba(34, 197, 94, 0.2));
      transition: transform 0.2s ease;
    }
    .company-logo:hover {
      transform: scale(1.01);
    }

    /* Хедер */
    .header {
      text-align: center;
      margin-bottom: 1.8rem;
      animation: floatIn 0.6s ease-out;
    }
    .mixer-icon {
      font-size: 2.4rem;
      filter: drop-shadow(0 0 8px rgba(99,102,241,0.5));
    }
    .title {
      font-size: 1.9rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ffffff, var(--primary), var(--accent));
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }
    .subtitle {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* Переключатель режимов */
    .mode-switch {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border-radius: 60px;
      padding: 6px;
      display: flex;
      gap: 8px;
      margin-bottom: 1.8rem;
      border: 1px solid var(--card-border);
    }
    .mode-btn {
      flex: 1;
      padding: 10px 6px;
      border-radius: 50px;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      background: transparent;
      color: var(--text-muted);
      border: none;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .mode-btn.active {
      background: linear-gradient(110deg, var(--primary-dark), var(--primary));
      color: white;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
    }

    /* Карточки */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 2rem;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(129, 140, 248, 0.5);
    }
    .card-title {
      font-size: 1.2rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.2rem;
    }

    /* Поля ввода */
    .input-group {
      margin-bottom: 1.2rem;
    }
    label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--text-muted);
      display: block;
      margin-bottom: 0.4rem;
      letter-spacing: 0.4px;
    }
    input, select {
      width: 100%;
      padding: 14px 18px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 1.3rem;
      font-size: 1rem;
      color: white;
      font-weight: 500;
      transition: 0.2s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
    }
    .helper-text {
      font-size: 0.7rem;
      color: #5b6e8c;
      margin-top: 5px;
    }
    .chip-info {
      background: rgba(34, 197, 94, 0.15);
      padding: 8px 12px;
      border-radius: 40px;
      text-align: center;
      margin: 1rem 0 0.3rem;
      border-left: 3px solid var(--greif-green);
      font-weight: 500;
      font-size: 0.9rem;
    }

    /* Кнопки */
    .btn {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 2rem;
      font-weight: 700;
      font-size: 0.95rem;
      background: linear-gradient(105deg, var(--primary), var(--primary-dark));
      color: white;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 0.8rem;
    }
    .btn:active { transform: scale(0.97); }

    /* Результат */
    .result-card {
      background: linear-gradient(125deg, rgba(16, 185, 129, 0.18), rgba(5, 150, 105, 0.1));
      border-left: 3px solid var(--success);
    }
    .result-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 12px 0;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
    }
    .solvent-value {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(120deg, #fff, #c7f0e2);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .stat-grid {
      display: flex;
      gap: 12px;
      margin-top: 18px;
    }
    .stat {
      flex: 1;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 1.2rem;
      padding: 10px;
      text-align: center;
    }
    .stat-number {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--greif-green);
    }

    /* Прогресс */
    .progress-area {
      margin: 12px 0 4px;
    }
    .flex-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.7rem;
    }
    .progress-bar {
      background: #1e293b;
      border-radius: 20px;
      height: 5px;
      overflow: hidden;
      margin-top: 4px;
    }
    .progress-fill {
      width: 97%;
      background: linear-gradient(90deg, #22c55e, #facc15);
      height: 5px;
    }

    footer {
      text-align: center;
      font-size: 0.65rem;
      color: #334155;
      margin-top: 1rem;
    }

    @keyframes floatIn {
      0% { opacity: 0; transform: translateY(-15px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="container">
  <!-- ЛОГОТИП КОМПАНИИ (ПРЯМАЯ ССЫЛКА) -->
  <div class="logo-container">
    <img 
      class="company-logo"
      src="https://i.ibb.co/b5Bkjkxm/4e41a0c995427c8eb6d03cf87a3752b8.jpg" 
      alt="GREIF Logo"
    >
  </div>

  <div class="header">
    <div class="mixer-icon">🧪⚙️</div>
    <h1 class="title">Ink Mixer Pro</h1>
    <p class="subtitle">Профессиональный расчёт для чернил и растворителей</p>
  </div>

  <!-- Переключатель режимов -->
  <div class="mode-switch" id="modeSwitch">
    <button class="mode-btn active" data-mode="fresh">🆕 Чистые чернила</button>
    <button class="mode-btn" data-mode="diluted">⚖️ Долив в разбавленные</button>
  </div>

  <!-- Карточка ввода данных -->
  <div class="card">
    <div class="card-title">
      <span>📐</span> 
      <span id="formTitle">Разбавление чистых чернил</span>
    </div>

    <div class="input-group">
      <label for="manufacturer">🏭 Производитель</label>
      <select id="manufacturer">
        <option value="sankem">Санкемикалз (26.7% раст. | CF2000:75/CF3000:25)</option>
        <option value="siko">Сико (33.3% раст. | CF2000:40/CF3000:60)</option>
        <option value="china">Китай (25% раст. | CF2000:80/CF3000:20)</option>
        <option value="tampo">Тампо Механика (22.1% раст. | CF2000:33.3/CF3000:66.7)</option>
      </select>
    </div>

    <div id="dynamicFields"></div>

    <div class="progress-area">
      <div class="flex-row"><span>🎯 Точность рецепта</span><span id="accuracyValue">97%</span></div>
      <div class="progress-bar"><div class="progress-fill" id="accuracyFill"></div></div>
    </div>

    <button class="btn" id="calculateBtn">🧮 РАССЧИТАТЬ ПРОПОРЦИИ</button>
  </div>

  <!-- Карточка результата (изначально скрыта) -->
  <div class="card result-card" id="resultCard" style="display: none;">
    <div class="card-title"><span>📊</span> Результат замеса</div>
    <div id="resultContent"></div>
    <div class="stat-grid" id="statGrid" style="display: none;">
      <div class="stat"><div class="stat-number" id="totalCost">0₽</div><div style="font-size:0.7rem;">стоимость</div></div>
      <div class="stat"><div class="stat-number" id="timeSave">~15 сек</div><div style="font-size:0.7rem;">экономия расчёта</div></div>
    </div>
  </div>

  <footer>© GREIF Ink Mixer Pro — точный подбор компонентов</footer>
</div>

<script>
  // ---------- БАЗА ДАННЫХ ПРОИЗВОДИТЕЛЕЙ ----------
  const manufacturerData = {
    sankem: { name:"Санкемикалз", solventPercent:0.267, cf2000ratio:0.75, cf3000ratio:0.25, costCf2000PerLiter:150, costCf3000PerLiter:200 },
    siko: { name:"Сико", solventPercent:0.333, cf2000ratio:0.4, cf3000ratio:0.6, costCf2000PerLiter:150, costCf3000PerLiter:200 },
    china: { name:"Китай", solventPercent:0.25, cf2000ratio:0.8, cf3000ratio:0.2, costCf2000PerLiter:150, costCf3000PerLiter:200 },
    tampo: { name:"Тампо Механика", solventPercent:0.221, cf2000ratio:0.333, cf3000ratio:0.667, costCf2000PerLiter:150, costCf3000PerLiter:200 }
  };

  let currentMode = 'fresh';   // fresh — разбавление чистых, diluted — долив в разбавленные

  function getManufacturerData() {
    const key = document.getElementById('manufacturer').value;
    return manufacturerData[key];
  }

  // Расчёт для режима "чистые чернила"
  function calculateFresh(inkWeight, data) {
    if (!inkWeight || inkWeight <= 0) return null;
    const totalSolventML = inkWeight * data.solventPercent;
    const cf2000 = Math.round(totalSolventML * data.cf2000ratio);
    const cf3000 = Math.round(totalSolventML * data.cf3000ratio);
    const cost = (cf2000 / 1000) * data.costCf2000PerLiter + (cf3000 / 1000) * data.costCf3000PerLiter;
    return {
      cf2000, cf3000,
      totalSolvent: Math.round(totalSolventML),
      totalCost: Math.round(cost),
      addedInkGrams: inkWeight
    };
  }

  // Расчёт для режима "долив в разбавленные" (весовой метод)
  function calculateDiluted(initialWeight, finalWeight, data) {
    if (!initialWeight || initialWeight <= 0) return { error: "Начальный вес должен быть больше 0" };
    if (!finalWeight || finalWeight <= initialWeight) return { error: "Финальный вес должен быть больше начального (добавьте чернила)" };
    const addedInk = finalWeight - initialWeight;
    if (addedInk <= 0) return { error: "Нет добавленных чернил, проверьте весы" };
    const totalSolventML = addedInk * data.solventPercent;
    const cf2000 = Math.round(totalSolventML * data.cf2000ratio);
    const cf3000 = Math.round(totalSolventML * data.cf3000ratio);
    const cost = (cf2000 / 1000) * data.costCf2000PerLiter + (cf3000 / 1000) * data.costCf3000PerLiter;
    return {
      cf2000, cf3000,
      totalSolvent: Math.round(totalSolventML),
      totalCost: Math.round(cost),
      addedInkGrams: addedInk
    };
  }

  // Динамическая отрисовка полей ввода в зависимости от режима
  function renderDynamicFields() {
    const container = document.getElementById('dynamicFields');
    const titleSpan = document.getElementById('formTitle');
    if (currentMode === 'fresh') {
      titleSpan.innerText = 'Разбавление чистых чернил';
      container.innerHTML = `
        <div class="input-group">
          <label>🎨 Вес ЧИСТЫХ чернил (граммы)</label>
          <input type="number" id="freshWeight" placeholder="например: 1000" step="1" autofocus>
          <div class="helper-text">Масса неразбавленных чернил, которые нужно смешать</div>
        </div>
      `;
    } else {
      titleSpan.innerText = 'Долив в разбавленные (весовой метод)';
      container.innerHTML = `
        <div class="input-group">
          <label>📦 Вес банки с РАЗБАВЛЕННЫМИ чернилами (г)</label>
          <input type="number" id="initialWeight" placeholder="например: 500" step="1">
          <div class="helper-text">Поставьте банку на весы → запишите вес</div>
        </div>
        <div class="input-group">
          <label>➕ Вес после добавления ЧИСТЫХ чернил (г)</label>
          <input type="number" id="finalWeight" placeholder="например: 1300" step="1">
          <div class="helper-text">Добавьте чистые чернила и снова взвесьте</div>
        </div>
        <div id="autoAddedPreview" class="chip-info" style="display: none;">
          ⚡ Добавлено чистых чернил: <strong id="previewAddedGrams">0</strong> г
        </div>
      `;
      const initInput = document.getElementById('initialWeight');
      const finalInput = document.getElementById('finalWeight');
      if (initInput && finalInput) {
        const updatePreview = () => {
          const init = parseFloat(initInput.value);
          const fin = parseFloat(finalInput.value);
          const previewDiv = document.getElementById('autoAddedPreview');
          const previewSpan = document.getElementById('previewAddedGrams');
          if (!isNaN(init) && !isNaN(fin) && fin > init && init >= 0) {
            const diff = (fin - init).toFixed(1);
            previewSpan.innerText = diff;
            previewDiv.style.display = 'block';
          } else {
            previewDiv.style.display = 'none';
          }
        };
        initInput.addEventListener('input', updatePreview);
        finalInput.addEventListener('input', updatePreview);
      }
    }
    document.getElementById('resultCard').style.display = 'none';
  }

  // Главный расчёт
  function performCalculation() {
    const manData = getManufacturerData();
    if (!manData) {
      alert("Ошибка загрузки данных производителя");
      return;
    }

    let result = null;
    if (currentMode === 'fresh') {
      const weightInput = document.getElementById('freshWeight');
      if (!weightInput) return;
      const weight = parseFloat(weightInput.value);
      if (isNaN(weight) || weight <= 0) {
        alert("❌ Введите вес чистых чернил (больше 0 грамм)");
        return;
      }
      result = calculateFresh(weight, manData);
      if (!result) { alert("Ошибка расчёта"); return; }
    } 
    else {
      const initVal = parseFloat(document.getElementById('initialWeight')?.value);
      const finalVal = parseFloat(document.getElementById('finalWeight')?.value);
      if (isNaN(initVal) || isNaN(finalVal)) {
        alert("⚠️ Заполните оба поля весов (начальный и финальный вес)");
        return;
      }
      result = calculateDiluted(initVal, finalVal, manData);
      if (result?.error) {
        alert(result.error);
        return;
      }
      if (!result) { alert("Ошибка вычислений для режима долива"); return; }
    }

    // Отрисовка результатов
    const resultDiv = document.getElementById('resultContent');
    const resultCard = document.getElementById('resultCard');
    const statGrid = document.getElementById('statGrid');
    
    const addedInfo = (currentMode === 'diluted') 
      ? `<div class="helper-text" style="margin-bottom:12px;">📌 Добавлено чистых чернил: <strong>${result.addedInkGrams} г</strong> (рассчитано по разнице весов)</div>`
      : `<div class="helper-text" style="margin-bottom:12px;">📌 Чистые чернила: <strong>${result.addedInkGrams} г</strong></div>`;

    const html = `
      ${addedInfo}
      <div class="result-item">
        <span>🔵 CF2000 (быстрый растворитель)</span>
        <span class="solvent-value">${result.cf2000} мл</span>
      </div>
      <div class="result-item">
        <span>🔴 CF3000 (вязкостный)</span>
        <span class="solvent-value">${result.cf3000} мл</span>
      </div>
      <div class="result-item">
        <span>⚡ Всего растворителя</span>
        <span class="solvent-value">${result.totalSolvent} мл</span>
      </div>
      <div class="chip-info" style="margin-top:12px; background:rgba(0,0,0,0.3);">
        🧪 Рецепт для ${manData.name} | пропорция CF2000:CF3000 = ${Math.round(manData.cf2000ratio*100)}% / ${Math.round(manData.cf3000ratio*100)}%
      </div>
    `;
    resultDiv.innerHTML = html;
    resultCard.style.display = 'block';
    statGrid.style.display = 'flex';
    document.getElementById('totalCost').innerHTML = result.totalCost + ' ₽';
    document.getElementById('timeSave').innerHTML = '⏱️ ~15 сек';
    document.getElementById('accuracyFill').style.width = '97%';
    document.getElementById('accuracyValue').innerHTML = '97%';
    resultCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  // Инициализация обработчиков
  function init() {
    renderDynamicFields();
    // Переключение режимов
    const modeBtns = document.querySelectorAll('.mode-btn');
    modeBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        currentMode = btn.getAttribute('data-mode');
        modeBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderDynamicFields();
        document.getElementById('resultCard').style.display = 'none';
      });
    });
    // Кнопка рассчитать
    const calcBtn = document.getElementById('calculateBtn');
    if (calcBtn) calcBtn.addEventListener('click', performCalculation);
    // Смена производителя -> скрыть старый результат
    const manSelect = document.getElementById('manufacturer');
    if (manSelect) manSelect.addEventListener('change', () => {
      document.getElementById('resultCard').style.display = 'none';
    });
    // Нажатие Enter
    const handleEnter = (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        performCalculation();
      }
    };
    document.addEventListener('keypress', handleEnter);
  }

  init();
</script>
</body>
</html>
